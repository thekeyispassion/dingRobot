# AI 会议室预约助手 — 配置模板
# 复制为 config.yaml 后填入真实值
#
# cp config.example.yaml config.yaml
# vim config.yaml

llm:
  # API 密钥（必填）
  # 阿里云百炼: https://dashscope.console.aliyun.com/apiKey
  # DeepSeek: https://platform.deepseek.com/api_keys
  api_key: "your-api-key-here"

  # API 端点（可选，默认阿里云百炼）
  # 阿里云百炼: https://dashscope.aliyuncs.com/compatible-mode/v1
  # DeepSeek: https://api.deepseek.com/v1
  # 其他兼容 OpenAI 协议的均可
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

  # 模型名（可选）
  # 阿里云: qwen-plus, qwen-max, qwen-turbo
  # DeepSeek: deepseek-chat, deepseek-reasoner
  model: "qwen-plus"

dingtalk:
  # 钉钉对接模式
  # openclaw  — 由 OpenClaw 处理钉钉连接（推荐）
  # standalone — 程序直接处理钉钉 webhook
  mode: "openclaw"

# 也可通过环境变量配置（优先级低于本文件）：
# export DDTALK_LLM_KEY="sk-xxx"
# export DDTALK_LLM_URL="https://dashscope.aliyuncs.com/compatible-mode/v1"
# export DDTALK_LLM_MODEL="qwen-plus"
# export DDTALK_DINGTALK_MODE="openclaw"
